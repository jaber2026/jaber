<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        body { background: #f0f2f5; }
        .sidebar { width: 260px; height: 100vh; background: #1c1e21; color: white; position: fixed; padding: 20px; }
        .content { margin-left: 260px; padding: 40px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Admin Console</h3>
        <hr>
        <button onclick="location.reload()" class="btn btn-outline-light w-100 mb-3">Refresh</button>
    </div>

    <div class="content">
        <div class="row">
            <div class="col-md-7">
                <div class="card p-4 mb-4">
                    <h4>🔴 Live Class Studio</h4>
                    <div id="adminMeet" style="height: 450px; background: #000; border-radius: 10px;"></div>
                    <div class="mt-3">
                        <button id="startLive" class="btn btn-success me-2">Start Stream</button>
                        <button id="stopLive" class="btn btn-danger">End Stream</button>
                    </div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card p-4">
                    <h4>📺 Course Update</h4>
                    <input type="text" id="vidId" class="form-control mb-3" placeholder="YouTube Video ID">
                    <button id="updBtn" class="btn btn-primary w-100">Update Video</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

       const firebaseConfig = {
  apiKey: "AIzaSyA_XiNNSak6wgQjWwf71oYUBzWmOrnxuS4",
  authDomain: "mohammad-jaber-bin-razzak.firebaseapp.com",
  projectId: "mohammad-jaber-bin-razzak",
  storageBucket: "mohammad-jaber-bin-razzak.firebasestorage.app",
  messagingSenderId: "384599675560",
  appId: "1:384599675560:web:fc13eea72b51210a76a89d",
  measurementId: "G-5KR4N7L7R4"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let api = null;

        document.getElementById('startLive').onclick = async () => {
            const room = "Class_" + Date.now();
            await setDoc(doc(db, "liveStatus", "now"), { active: true, room: room });
            
            const options = {
                roomName: room, width: '100%', height: 450,
                parentNode: document.querySelector('#adminMeet'),
                configOverwrite: { startWithAudioMuted: false, startWithVideoMuted: false }, // ক্যামেরা অন থাকবে
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera', 'desktop', 'hangup', 'chat'] }
            };
            api = new JitsiMeetExternalAPI("meet.jit.si", options);
        };

        document.getElementById('stopLive').onclick = async () => {
            await setDoc(doc(db, "liveStatus", "now"), { active: false });
            if(api) api.dispose();
            location.reload();
        };

        document.getElementById('updBtn').onclick = async () => {
            await setDoc(doc(db, "courseData", "current"), { youtubeId: document.getElementById('vidId').value });
            alert("Updated!");
        };
    </script>
</body>
</html>
